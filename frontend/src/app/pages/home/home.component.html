<div class="home">

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="content">

    <div class="logo-wrap">
      <img src="logo.png" class="logo-img" alt="Logo" />
    </div>

    <h1 class="title">RealitiAI</h1>

    <p class="subtitle">
      Habla con nosotros sobre tus relaciones de pareja, amistades o familia, y te ayudaremos a entender mejor lo que estás viviendo.
    </p>

    <div class="features">
      <div class="feature">
        <img src="escudo.png" class="feat-icon-img" alt="Escudo" />
        <span>Manipulacion</span>
      </div>
      <div class="feature">
        <img src="alerta.png" class="feat-icon-img" alt="Alerta" />
        <span>Niveles de Riesgo</span>
      </div>
      <div class="feature">
        <img src="globo.png" class="feat-icon-img" alt="Globo" />
        <span>Entendimiento</span>
      </div>
    </div>

    <button class="btn-start" (click)="irChat()">
      Hablemos
      <span class="btn-arrow">→</span>
    </button>

    <p class="footer-note">Tus conversaciones son privadas y no se guardan</p>

  </div>
</div>
